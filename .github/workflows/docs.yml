name: 部署文档到 GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site-docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r site-docs/requirements.txt

      - name: 构建文档
        run: cd site-docs && mkdocs build -d site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site-docs/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
