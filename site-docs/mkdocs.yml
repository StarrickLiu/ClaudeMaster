site_name: ClaudeMaster
site_description: Claude Code Web 管理平台 — 监控、管理、交互
site_url: ""

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 快速开始:
    - getting-started/index.md
    - 安装: getting-started/installation.md
    - 配置: getting-started/configuration.md
  - 使用指南:
    - guide/dashboard.md
    - guide/chat.md
    - guide/viewer.md
    - guide/agent.md
  - 架构:
    - architecture/overview.md
    - architecture/broker.md
    - architecture/multi-client.md
    - architecture/data-model.md
    - architecture/api-reference.md
  - 开发:
    - development/index.md
    - development/conventions.md
    - development/testing.md
